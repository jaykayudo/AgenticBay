services:
  # ── Infrastructure ────────────────────────────────────────────────────────────

  postgres:
    profiles:
      - local-db
    image: pgvector/pgvector:pg16
    container_name: agentic_bay_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agentic_bay
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: agentic_bay_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Application ───────────────────────────────────────────────────────────────

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agentic_bay_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      # These override whatever is in backend/.env for docker-internal networking
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://postgres:postgres@postgres:5432/agentic_bay}
      DATABASE_URL_SYNC: ${DATABASE_URL_SYNC:-postgresql+psycopg2://postgres:postgres@postgres:5432/agentic_bay}
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: agentic_bay_web
    restart: unless-stopped
    environment:
      # BACKEND_URL / BACKEND_WS_URL come from the root .env file.
      # These must be browser-accessible URLs (i.e. the host's address, not container names).
      NEXT_PUBLIC_API_URL: ${BACKEND_URL:-http://localhost:8000}
      NEXT_PUBLIC_WS_URL: ${BACKEND_WS_URL:-ws://localhost:8000}
      NODE_ENV: development
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./web:/app
      - /app/node_modules
      - /app/.next

  # ── Example service agents (start with: docker compose --profile agents up) ──

  document-summarizer:
    profiles:
      - agents
    build:
      context: ./examples/service-agents/document-summarizer
      dockerfile: Dockerfile
    container_name: agentic_bay_doc_summarizer
    restart: unless-stopped
    env_file:
      - path: ./examples/service-agents/document-summarizer/.env
        required: false
    ports:
      - "5001:5000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  research-agent:
    profiles:
      - agents
    build:
      context: ./examples/service-agents/research
      dockerfile: Dockerfile
    container_name: agentic_bay_research_agent
    restart: unless-stopped
    env_file:
      - path: ./examples/service-agents/research/.env
        required: false
    ports:
      - "5002:5000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  web-scraper:
    profiles:
      - agents
    build:
      context: ./examples/service-agents/web-scraper
      dockerfile: Dockerfile
    container_name: agentic_bay_web_scraper
    restart: unless-stopped
    env_file:
      - path: ./examples/service-agents/web-scraper/.env
        required: false
    ports:
      - "5003:5000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:
  redis_data:
